kind = "web"
previewPath = "/"
title = "SecureBank"
version = "1.0.0"
id = "artifacts/secure-banking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18992

[services.development]
run = "pnpm --filter @workspace/secure-banking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/secure-banking", "run", "build" ]
publicDir = "artifacts/secure-banking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18992"
BASE_PATH = "/"
