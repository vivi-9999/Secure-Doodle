openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Secure Online Transaction System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: transactions
    description: Transaction operations
  - name: complaints
    description: Complaint operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registration submitted, awaiting admin approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials or account not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/duress-pin:
    put:
      operationId: setDuressPin
      tags: [users]
      summary: Set or update the emergency duress PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDuressPinBody"
      responses:
        "200":
          description: Duress PIN set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid current PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/pin:
    put:
      operationId: updatePin
      tags: [users]
      summary: Update PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePinBody"
      responses:
        "200":
          description: PIN updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/account/{accountNumber}:
    get:
      operationId: lookupAccount
      tags: [users]
      summary: Lookup account by account number (for transfer recipient verification)
      parameters:
        - name: accountNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLookup"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/deposit:
    post:
      operationId: deposit
      tags: [transactions]
      summary: Deposit money
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositBody"
      responses:
        "200":
          description: Deposit successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid PIN or amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/withdraw:
    post:
      operationId: withdraw
      tags: [transactions]
      summary: Withdraw money
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawBody"
      responses:
        "200":
          description: Withdrawal successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid PIN, insufficient funds, or invalid amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/transfer:
    post:
      operationId: transfer
      tags: [transactions]
      summary: Transfer money to another account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferBody"
      responses:
        "200":
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid PIN, insufficient funds, or invalid recipient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/history:
    get:
      operationId: getTransactionHistory
      tags: [transactions]
      summary: Get transaction history for current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionHistoryResponse"

  /transactions/summary:
    get:
      operationId: getTransactionSummary
      tags: [transactions]
      summary: Get account summary stats (total deposits, withdrawals, transfers, net)
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionSummary"

  /complaints:
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a complaint (max 250 chars)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintBody"
      responses:
        "201":
          description: Complaint submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: getMyComplaints
      tags: [complaints]
      summary: Get current user's complaints
      responses:
        "200":
          description: Complaints list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users with optional status filter
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, rejected]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/activate:
    put:
      operationId: adminActivateUser
      tags: [admin]
      summary: Activate a user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/reject:
    put:
      operationId: adminRejectUser
      tags: [admin]
      summary: Reject a user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/transactions:
    get:
      operationId: adminGetTransactions
      tags: [admin]
      summary: Get all transactions with optional type filter
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [deposit, withdrawal, transfer]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: All transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTransactionResponse"

  /admin/complaints:
    get:
      operationId: adminGetComplaints
      tags: [admin]
      summary: Get all user complaints
      responses:
        "200":
          description: All complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminComplaint"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin dashboard stats (user counts, transaction totals)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/firewall:
    get:
      operationId: adminGetFirewallEvents
      tags: [admin]
      summary: SIEM firewall - enriched transaction events with risk scoring
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Firewall events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirewallResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RegisterBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        pin:
          type: string
          minLength: 4
          maxLength: 6
        panCard:
          type: string
        aadhaar:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
      required: [firstName, lastName, email, phone, pin, panCard, aadhaar, address, city, state]

    LoginBody:
      type: object
      properties:
        accountNumber:
          type: string
        pin:
          type: string
      required: [accountNumber, pin]

    AdminLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
        role:
          type: string
          enum: [user, admin]
      required: [message]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        accountNumber:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        balance:
          type: number
        status:
          type: string
          enum: [pending, active, rejected]
        address:
          type: string
        city:
          type: string
        state:
          type: string
        createdAt:
          type: string
        duressMode:
          type: boolean
        hasDuressPin:
          type: boolean
      required: [id, accountNumber, firstName, lastName, email, phone, balance, status, address, city, state, createdAt]

    AccountLookup:
      type: object
      properties:
        accountNumber:
          type: string
        fullName:
          type: string
      required: [accountNumber, fullName]

    UpdatePinBody:
      type: object
      properties:
        currentPin:
          type: string
        newPin:
          type: string
          minLength: 4
          maxLength: 6
      required: [currentPin, newPin]

    SetDuressPinBody:
      type: object
      properties:
        currentPin:
          type: string
        duressPin:
          type: string
          minLength: 4
          maxLength: 6
      required: [currentPin, duressPin]

    DepositBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        pin:
          type: string
      required: [amount, pin]

    WithdrawBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        pin:
          type: string
      required: [amount, pin]

    TransferBody:
      type: object
      properties:
        toAccountNumber:
          type: string
        amount:
          type: number
          minimum: 1
        pin:
          type: string
      required: [toAccountNumber, amount, pin]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, transfer]
        amount:
          type: number
        fromAccountNumber:
          type: string
          nullable: true
        toAccountNumber:
          type: string
          nullable: true
        fromName:
          type: string
          nullable: true
        toName:
          type: string
          nullable: true
        status:
          type: string
          enum: [success, failed]
        createdAt:
          type: string
      required: [id, type, amount, status, createdAt]

    TransactionResponse:
      type: object
      properties:
        message:
          type: string
        transaction:
          $ref: "#/components/schemas/Transaction"
        newBalance:
          type: number
      required: [message, transaction, newBalance]

    TransactionHistoryResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
      required: [transactions, total]

    TransactionSummary:
      type: object
      properties:
        totalDeposits:
          type: number
        totalWithdrawals:
          type: number
        totalTransfersSent:
          type: number
        totalTransfersReceived:
          type: number
        transactionCount:
          type: integer
        currentBalance:
          type: number
      required: [totalDeposits, totalWithdrawals, totalTransfersSent, totalTransfersReceived, transactionCount, currentBalance]

    CreateComplaintBody:
      type: object
      properties:
        description:
          type: string
          maxLength: 250
      required: [description]

    Complaint:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [open, resolved]
        createdAt:
          type: string
      required: [id, description, status, createdAt]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        accountNumber:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        balance:
          type: number
        status:
          type: string
          enum: [pending, active, rejected]
        panCard:
          type: string
        aadhaar:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        createdAt:
          type: string
      required: [id, accountNumber, firstName, lastName, email, phone, balance, status, panCard, aadhaar, address, city, state, createdAt]

    AdminTransactionResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
      required: [transactions, total]

    AdminComplaint:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userAccountNumber:
          type: string
        userName:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, resolved]
        createdAt:
          type: string
      required: [id, userId, userAccountNumber, userName, description, status, createdAt]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        pendingUsers:
          type: integer
        activeUsers:
          type: integer
        rejectedUsers:
          type: integer
        totalTransactions:
          type: integer
        totalDeposits:
          type: number
        totalWithdrawals:
          type: number
        totalTransfers:
          type: number
        openComplaints:
          type: integer
      required: [totalUsers, pendingUsers, activeUsers, rejectedUsers, totalTransactions, totalDeposits, totalWithdrawals, totalTransfers, openComplaints]

    FirewallEvent:
      type: object
      properties:
        id:
          type: integer
        eventId:
          type: string
        timestamp:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        riskScore:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, transfer]
        amount:
          type: number
        fromAccount:
          type: string
          nullable: true
        toAccount:
          type: string
          nullable: true
        fromName:
          type: string
          nullable: true
        toName:
          type: string
          nullable: true
        status:
          type: string
        riskFlags:
          type: array
          items:
            type: string
        description:
          type: string
      required: [id, eventId, timestamp, severity, riskScore, type, amount, status, riskFlags, description]

    FirewallResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/FirewallEvent"
        stats:
          type: object
          properties:
            total:
              type: integer
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
            info:
              type: integer
          required: [total, critical, high, medium, low, info]
      required: [events, stats]
